<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Tip Calculator App</title>
</head>
<body>

  <main class="parent-container">
    
    <img 
      src="./images/logo.svg" 
      alt="Splitter Logo" 
      class="logo"
    >

    <div class="container">

      <!-- Left Section -->
      <section class="input-section">

        <!-- Bill Input -->
        <div class="input-group">
          <label for="bill">Bill</label>

          <input 
            type="number"
            id="bill"
            placeholder="0"
            min="0"
            step="0.01"
          >
        </div>

        <!-- Tip Buttons -->
        <div class="tip-section">
          <p>Select Tip %</p>

          <div class="grid-button">

            <button type="button" class="tip-btn">5%</button>
            <button type="button" class="tip-btn">10%</button>
            <button type="button" class="tip-btn">15%</button>
            <button type="button" class="tip-btn">25%</button>
            <button type="button" class="tip-btn">50%</button>

            <input
              type="number"
              class="custom-tip"
              placeholder="Custom"
              min="0"
              max="100"
            >

          </div>
        </div>

        <!-- Number of People -->
        <div class="input-group">
          <label for="people">Number of People</label>

          <input
            type="number"
            id="people"
            placeholder="0"
            min="1"
          >
        </div>

      </section>

      <!-- Right Section -->
      <section class="result-section">

        <div class="result-row">
          <div>
            <h2>Tip Amount</h2>
            <p>/ person</p>
          </div>

          <div class="amount">$0.00</div>
        </div>

        <div class="result-row">
          <div>
            <h2>Total</h2>
            <p>/ person</p>
          </div>

          <div class="amount">$0.00</div>
        </div>

        <button type="button" id="reset" class="reset-btn">
          RESET
        </button>

      </section>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>

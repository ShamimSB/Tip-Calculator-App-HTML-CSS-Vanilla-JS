<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Tip Calculator App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="parent-container">
    <img src="images/logo.svg" alt="Splitter logo" class="logo">

    <div class="container">

      <!-- Left side input section -->
      <section class="input-section" aria-label="Calculator inputs">

        <div class="input-group">
          <label for="bill">Bill</label>
          <div class="input-wrapper">
            <input
              type="number"
              id="bill"
              placeholder="0"       
              min="0"               
              step="0.01"
            >
          </div>
        </div>

        <div class="tip-section">
          <p id="tip-label">Select Tip %</p> 
          <div class="grid-button" role="group" aria-labelledby="tip-label"> 
            <button class="tip-btn" aria-label="5 percent tip">5%</button>
            <button class="tip-btn" aria-label="10 percent tip">10%</button>
            <button class="tip-btn" aria-label="15 percent tip">15%</button>
            <button class="tip-btn" aria-label="25 percent tip">25%</button>
            <button class="tip-btn" aria-label="50 percent tip">50%</button>
            <input
              type="number"
              placeholder="Custom"
              class="custom-tip"
              aria-label="Custom tip percentage" 
              min="0"
              max="100"
            >
          </div>
        </div>

        <div class="input-group">
          <label for="people">Number of People</label>
          <div class="input-wrapper">
            <input
              type="number"
              id="people"
              placeholder="0"       
              min="1"               
              step="1"              
            >
          </div>
        </div>

      </section>

      <!-- Right side result section -->
      <section class="result-section" aria-label="Tip calculation results"> 

        <div class="result-row">
          <div>
            <h2>Tip Amount</h2>
            <p>/ Person</p>
          </div>
          <div class="amount" aria-live="polite" aria-label="Tip amount per person">$0.00</div> 
        </div>

        <div class="result-row">
          <div>
            <h2>Total</h2>
            <p>/ Person</p>
          </div>
          <div class="amount" aria-live="polite" aria-label="Total amount per person">$0.00</div> 
        </div>

        <button id="reset" class="reset-btn">RESET</button>

      </section>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
